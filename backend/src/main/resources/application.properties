spring.application.name=smart-pet-care
server.port=${SERVER_PORT:8081}

# Database Configuration (Using H2 for out-of-the-box working without MySQL needed)
spring.datasource.url=jdbc:h2:file:./data/petcare_db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;IGNORECASE=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL config (Commented out)
# spring.datasource.url=jdbc:mysql://localhost:3306/petcare_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=Pavan@938
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Razorpay Configuration (PLACE YOUR KEYS HERE)
razorpay.key.id=
razorpay.key.secret=

# JWT Configuration (Placeholders)
jwt.secret=ThereIsNoSecretKeyHereJustARandomStringForDemonstrationPurposes
jwt.expiration=86400000


# ============================================================
# Mail / SMTP Configuration — Gmail Setup
# ============================================================
# STEP 1: Fill in your Gmail address below (e.g. yourname@gmail.com)
spring.mail.username=YOUR_GMAIL_ADDRESS@gmail.com

# STEP 2: Fill in your Gmail App Password (NOT your regular Gmail password)
#   How to get one:
#   1. Go to https://myaccount.google.com/security
#   2. Enable 2-Step Verification (if not already)
#   3. Search "App passwords" → create one for "Mail"
#   4. Paste the 16-character code below (no spaces)
spring.mail.password=YOUR_16_CHAR_APP_PASSWORD

# Pre-configured Gmail SMTP settings (do not change)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# Google Calendar / Meet Configuration
# For service-account based access, the target organizer calendar should either be:
# 1. a calendar shared with the service account, or
# 2. a Workspace user reached through delegated-user-email.
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
google.calendar.application-name=${GOOGLE_CALENDAR_APPLICATION_NAME:Smart Pet Care Management System}
google.calendar.calendar-id=${GOOGLE_CALENDAR_CALENDAR_ID:primary}
google.calendar.service-account-key-path=${GOOGLE_CALENDAR_SERVICE_ACCOUNT_KEY_PATH:}
google.calendar.delegated-user-email=${GOOGLE_CALENDAR_DELEGATED_USER_EMAIL:}
